name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - run: zig version

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  test-zig:
    name: zig build + test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - name: cargo build --bin js2rustc
        run: cargo build --bin js2rustc

      - name: Run js2rustc (zig build + zig test)
        run: cargo run
