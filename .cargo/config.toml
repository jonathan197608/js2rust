# ── Linux ──
# rust-lld supports ELF natively and tolerates Zig archive alignment quirks.
[target.x86_64-unknown-linux-gnu]
linker = "rust-lld"

[target.aarch64-unknown-linux-gnu]
linker = "rust-lld"

# ── Windows ──
# Use rust-lld (LLVM LLD) as linker for MSVC target.
# Needed because Zig-generated COFF objects have COMDAT sections
# that MSVC link.exe cannot handle correctly.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

# ── macOS ──
# rust-lld does NOT support Mach-O. Use `zig cc` via a wrapper script so
# that Zig's own linker handles the misaligned archives it produces.
[target.aarch64-apple-darwin]
linker = ".cargo/zig-cc"
