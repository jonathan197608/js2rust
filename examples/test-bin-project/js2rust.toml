[project]
js_files = ["js_src/main.js"]

[build]
run_zig_build = true

[[host_functions]]
name = "host_add"
params = ["i64", "i64"]
returns = "i64"

[[host_functions]]
name = "host_multiply"
params = ["i64", "i64"]
returns = "i64"

[[host_functions]]
name = "host_concat"
params = ["str", "str"]
returns = "str"

[[host_functions]]
name = "host_strlen"
params = ["str"]
returns = "i64"

[[host_functions]]
name = "fetch_user"
params = ["str"]
is_async = true
async_returns = { id = "i64", name = "str" }
